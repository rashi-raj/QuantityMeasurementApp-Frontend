<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quantity Measurement</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/components.css" />
    <style>
        /* ── User profile chip ── */
        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .user-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .25);
            border: 2px solid rgba(255, 255, 255, .5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 0.78rem;
            color: #fff;
            flex-shrink: 0;
        }

        .user-name {
            font-family: var(--font-body);
            font-size: 0.86rem;
            font-weight: 500;
            color: rgba(255, 255, 255, .92);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 110px;
        }

        .logout-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 7px 13px;
            background: rgba(255, 255, 255, .15);
            border: 1.5px solid rgba(255, 255, 255, .3);
            border-radius: var(--radius-sm);
            color: #fff;
            font-family: var(--font-body);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all .2s;
            white-space: nowrap;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, .28);
        }

        .logout-btn .logout-label {
            /* hide text on very small screens */
        }

        /* ── Responsive header overrides ── */
        @media (max-width: 520px) {
            .header-right {
                gap: 8px;
            }

            .user-name {
                display: none;
            }

            /* show only avatar on small screens */
            .logout-btn {
                padding: 7px 10px;
            }

            .logout-btn .logout-label {
                display: none;
            }
        }

        @media (max-width: 360px) {
            .history-toggle-btn .hist-label {
                display: none;
            }

            .history-toggle-btn {
                padding: 8px 10px;
            }
        }
    </style>
</head>

<body>

    <!-- ERROR BANNER -->
    <div id="error-banner" class="error-banner hidden">
        <span id="error-banner-msg">⚠ Service unavailable. Check if json-server is running.</span>
        <button id="error-banner-close" aria-label="Close">✕</button>
    </div>

    <header class="app-header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-icon">⚖</span>
                <span class="logo-text">Quant App</span>
            </div>
            <div class="header-right">
                <button class="history-toggle-btn" id="history-toggle-btn" title="View History">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <polyline points="12 6 12 12 16 14" />
                    </svg>
                    <span class="hist-label">History</span>
                </button>

                <div class="user-chip">
                    <div class="user-avatar" id="user-avatar">?</div>
                    <span class="user-name" id="user-name-display"></span>
                </div>

                <button class="logout-btn" id="logout-btn" title="Logout">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                    <span class="logout-label">Logout</span>
                </button>
            </div>
        </div>
    </header>

    <main class="app-main">
        <!-- CALCULATOR PANEL -->
        <section class="calculator-panel" id="calculator-panel">

            <div class="section-label">CHOOSE TYPE</div>
            <div class="type-grid" id="type-grid">
                <button class="type-card active" data-type="Length">
                    <span class="type-icon">📏</span>
                    <span class="type-name">Length</span>
                </button>
                <button class="type-card" data-type="Weight">
                    <span class="type-icon">⚖️</span>
                    <span class="type-name">Weight</span>
                </button>
                <button class="type-card" data-type="Temperature">
                    <span class="type-icon">🌡️</span>
                    <span class="type-name">Temperature</span>
                </button>
                <button class="type-card" data-type="Volume">
                    <span class="type-icon">💧</span>
                    <span class="type-name">Volume</span>
                </button>
            </div>

            <div class="section-label" style="margin-top:28px;">CHOOSE ACTION</div>
            <div class="action-tabs" id="action-tabs">
                <button class="action-tab active" data-action="Comparison">Comparison</button>
                <button class="action-tab" data-action="Conversion">Conversion</button>
                <button class="action-tab" data-action="Arithmetic">Arithmetic</button>
            </div>

            <div class="inputs-row">
                <div class="input-panel">
                    <label class="panel-label">FROM</label>
                    <div class="number-input-wrap">
                        <input type="number" id="from-value" class="number-input" placeholder="0" autocomplete="off"
                            inputmode="decimal" />
                        <span class="input-error" id="from-error"></span>
                    </div>
                    <select class="unit-select" id="from-unit">
                        <option value="" disabled selected>Select Unit</option>
                    </select>
                </div>

                <div class="operator-panel" id="operator-panel" style="display:none;">
                    <div class="operator-label">OP</div>
                    <div class="operator-btns">
                        <button class="op-btn active" data-op="+">+</button>
                        <button class="op-btn" data-op="-">−</button>
                        <button class="op-btn" data-op="*">×</button>
                        <button class="op-btn" data-op="/">÷</button>
                    </div>
                </div>

                <div class="arrow-divider" id="arrow-divider">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="5" y1="12" x2="19" y2="12" />
                        <polyline points="12 5 19 12 12 19" />
                    </svg>
                </div>

                <div class="input-panel">
                    <label class="panel-label">TO</label>
                    <div class="number-input-wrap">
                        <input type="number" id="to-value" class="number-input" placeholder="0" autocomplete="off"
                            inputmode="decimal" />
                        <span class="input-error" id="to-error"></span>
                    </div>
                    <select class="unit-select" id="to-unit">
                        <option value="" disabled selected>Select Unit</option>
                    </select>
                </div>
            </div>

            <button class="calculate-btn" id="calculate-btn">
                Calculate
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="13 2 13 9 22 9" />
                    <polyline points="11 22 11 15 2 15" />
                    <path d="M22 9l-9 13L2 15l9-13z" />
                </svg>
            </button>

            <div class="result-area" id="result-area">
                <div class="result-placeholder" id="result-placeholder">
                    Enter values above and hit Calculate
                </div>
                <div class="result-content hidden" id="result-content">
                    <div class="result-expression" id="result-expression"></div>
                    <div class="result-value-row">
                        <span class="result-number" id="result-number"></span>
                        <span class="result-unit" id="result-unit"></span>
                    </div>
                </div>
            </div>

            <button class="reset-btn" id="reset-btn">↺ Reset Form</button>

        </section>

        <!-- HISTORY SIDEBAR -->
        <aside class="history-sidebar" id="history-sidebar">
            <div class="history-header">
                <h2 class="history-title">History</h2>
                <button class="history-clear-btn" id="history-clear-btn">Clear All</button>
            </div>
            <div class="history-list" id="history-list">
                <div class="history-empty" id="history-empty">No calculations yet.</div>
            </div>
        </aside>
    </main>

    <script>
        /* Auth guard */
        const userData = sessionStorage.getItem('quanment_user');
        if (!userData) {
            window.location.href = 'login.html';
        } else {
            const user = JSON.parse(userData);
            const initials = user.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
            document.getElementById('user-avatar').textContent = initials;
            document.getElementById('user-name-display').textContent = user.name.split(' ')[0];
        }

        document.getElementById('logout-btn').addEventListener('click', () => {
            if (confirm('Log out of Quant App?')) {
                sessionStorage.removeItem('quanment_user');
                window.location.href = 'login.html';
            }
        });
    </script>
    <script type="module" src="js/app.js"></script>
</body>

</html>
