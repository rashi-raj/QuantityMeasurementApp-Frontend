<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quantity Measurement</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        :root {
    --primary: #8B5E3C;       
    --primary-dark: #6B4226;   
    --primary-light: #F5EFEA;  
    --accent: #A47551;         
    --bg: #F9F5F1;             
    
    --surface: #FFFFFF;
    --surface-2: #F6F1EC;
    --border: #E0D6CC;

    --text-primary: #3E2C23;
    --text-secondary: #6B4F3A;
    --text-muted: #9A7B64;
}

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 16px;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(79, 110, 247, .12) 0%, transparent 70%);
            top: -200px;
            left: -200px;
            border-radius: 50%;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(16, 185, 129, .09) 0%, transparent 70%);
            bottom: -130px;
            right: -130px;
            border-radius: 50%;
            pointer-events: none;
        }

        /* ── Card ── */
        .auth-card {
            background: var(--surface);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 440px;
            overflow: hidden;
            animation: cardIn .5s cubic-bezier(.34, 1.56, .64, 1) both;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(28px) scale(.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ── Logo bar ── */
        .auth-logo {
            background: linear-gradient(135deg, #8B5E3C, #6B4226);
            padding: 24px 32px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .auth-logo-icon {
            font-size: 1.8rem;
            line-height: 1;
            flex-shrink: 0;
        }

        .auth-logo-text {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: clamp(1rem, 5vw, 1.7rem);
            color: #fff;
            letter-spacing: -.5px;
        }

        .auth-logo-sub {
            margin-top: 2px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, .7);
            font-weight: 400;
            letter-spacing: .04em;
        }

        /* ── Tabs ── */
        .auth-tabs {
            display: flex;
            border-bottom: 2px solid var(--border);
            background: var(--surface-2);
        }

        .auth-tab {
            flex: 1;
            padding: 13px 0;
            min-height: 48px;
            font-family: var(--font-display);
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: .06em;
            text-transform: uppercase;
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            transition: color .2s;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        .auth-tab::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--primary);
            transform: scaleX(0);
            transition: transform .25s ease;
        }

        .auth-tab.active {
            color: var(--primary);
        }

        .auth-tab.active::after {
            transform: scaleX(1);
        }

        /* ── Form body ── */
        .auth-body {
            padding: 28px 32px 32px;
        }

        .form-panel {
            display: none;
        }

        .form-panel.active {
            display: block;
            animation: fadeUp .3s ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-greeting {
            font-family: var(--font-display);
            font-size: clamp(1.05rem, 4vw, 1.25rem);
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .form-sub {
            font-size: 0.84rem;
            color: var(--text-muted);
            margin-bottom: 22px;
        }

        /* ── Fields ── */
        .field-group {
            margin-bottom: 16px;
        }

        .field-label {
            display: block;
            font-family: var(--font-display);
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .field-wrap {
            position: relative;
        }

        .field-input {
            width: 100%;
            padding: 12px 16px;
            font-family: var(--font-body);
            font-size: 1rem;
            /* 16px prevents iOS auto-zoom */
            color: var(--text-primary);
            background: var(--surface-2);
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            outline: none;
            transition: border-color .2s, box-shadow .2s, background .2s;
            -webkit-appearance: none;
            appearance: none;
        }

        .field-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 110, 247, .12);
            background: #fff;
        }

        .field-input.error {
            border-color: var(--danger);
            box-shadow: 0 0 0 3px rgba(239, 68, 68, .1);
        }

        .field-input.valid {
            border-color: var(--accent);
        }

        .field-input[type="password"] {
            padding-right: 46px;
        }

        /* Eye toggle — generous tap target */
        .eye-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            line-height: 0;
            transition: color .15s;
            min-width: 40px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .eye-toggle:hover {
            color: var(--primary);
        }

        .field-error {
            display: block;
            font-size: 0.73rem;
            color: var(--danger);
            margin-top: 4px;
            min-height: 16px;
            font-weight: 500;
        }

        /* ── Submit button ── */
        .auth-btn {
            width: 100%;
            margin-top: 6px;
            padding: 14px 24px;
            min-height: 50px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: .03em;
            cursor: pointer;
            transition: all .2s ease;
            box-shadow: 0 4px 14px rgba(79, 110, 247, .3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            -webkit-tap-highlight-color: transparent;
        }

        .auth-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(79, 110, 247, .4);
        }

        .auth-btn:active {
            transform: translateY(0);
        }

        .auth-btn:disabled {
            background: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, .35);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            display: inline-block;
        }

        .auth-switch {
            text-align: center;
            margin-top: 18px;
            font-size: 0.84rem;
            color: var(--text-muted);
        }

        .auth-switch a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
        }

        .auth-switch a:hover {
            text-decoration: underline;
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--text-primary);
            color: #fff;
            padding: 12px 22px;
            border-radius: 40px;
            font-size: 0.88rem;
            font-weight: 500;
            box-shadow: var(--shadow-md);
            transition: transform .35s cubic-bezier(.34, 1.56, .64, 1), opacity .3s;
            opacity: 0;
            z-index: 9999;
            max-width: calc(100vw - 32px);
            text-align: center;
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: var(--accent);
        }

        .toast.error {
            background: var(--danger);
        }

        /* ══════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════ */

        /* ≤ 520px — phones */
        @media (max-width: 520px) {
            body {
                padding: 12px;
                align-items: flex-start;
                padding-top: 28px;
            }

            .auth-card {
                border-radius: var(--radius-lg);
            }

            .auth-logo {
                padding: 20px 24px 16px;
                gap: 10px;
            }

            .auth-logo-icon {
                font-size: 1.5rem;
            }

            .auth-body {
                padding: 22px 24px 28px;
            }

            .field-group {
                margin-bottom: 14px;
            }
        }

        /* ≤ 400px — small phones */
        @media (max-width: 400px) {
            body {
                padding: 8px;
                padding-top: 16px;
            }

            .auth-card {
                border-radius: var(--radius-md);
            }

            .auth-logo {
                padding: 16px 18px 14px;
            }

            .auth-logo-sub {
                display: none;
            }

            .auth-body {
                padding: 18px 18px 24px;
            }

            .form-sub {
                margin-bottom: 16px;
            }
        }

        /* ≤ 320px — very tiny screens */
        @media (max-width: 320px) {
            .auth-body {
                padding: 14px 14px 20px;
            }

            .auth-btn {
                font-size: 0.9rem;
                padding: 12px 16px;
            }

            .auth-logo-text {
                font-size: 1.2rem;
            }
        }

        /* Landscape phone — limit vertical space */
        @media (max-height: 600px) and (orientation: landscape) {
            body {
                padding: 8px;
                align-items: flex-start;
            }

            .auth-logo {
                padding: 12px 24px 10px;
            }

            .auth-body {
                padding: 14px 24px 18px;
            }

            .field-group {
                margin-bottom: 10px;
            }

            .form-sub {
                margin-bottom: 12px;
            }
        }
    </style>
</head>

<body>

    <div class="auth-card">

        <div class="auth-logo">

            <div>
                <div class="auth-logo-text">Quantity Measurement</div>
            </div>
        </div>

        <div class="auth-tabs">
            <button class="auth-tab active" id="tab-login">Login</button>
            <button class="auth-tab" id="tab-signup">Sign Up</button>
        </div>

        <div class="auth-body">

            <!-- LOGIN -->
            <div class="form-panel active" id="panel-login">
                <div class="form-greeting">Welcome back</div>
                <div class="form-sub">Sign in to continue</div>
                <div class="field-group">
                    <label class="field-label" for="login-email">Email</label>
                    <div class="field-wrap">
                        <input type="email" id="login-email" class="field-input" placeholder="you@example.com"
                            autocomplete="email" />
                    </div>
                    <span class="field-error" id="login-email-err"></span>
                </div>

                <div class="field-group">
                    <label class="field-label" for="login-password">Password</label>
                    <div class="field-wrap">
                        <input type="password" id="login-password" class="field-input" placeholder="Enter your password"
                            autocomplete="current-password" />
                        <button class="eye-toggle" id="login-eye" type="button" aria-label="Toggle password visibility">
                            <svg id="login-eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                    <span class="field-error" id="login-pass-err"></span>
                </div>

                <button class="auth-btn" id="login-btn">
                    Sign In
                    
                </button>
                <div class="auth-switch">Don't have an account? <a id="go-signup">Create one</a></div>
            </div>

            <!-- SIGNUP -->
            <div class="form-panel" id="panel-signup">
                <div class="form-greeting">Create account</div>
                <div class="form-sub">Join — it's free</div>

                <div class="field-group">
                    <label class="field-label" for="signup-name">Full Name</label>
                    <div class="field-wrap">
                        <input type="text" id="signup-name" class="field-input" placeholder="Your full name"
                            autocomplete="name" />
                    </div>
                    <span class="field-error" id="signup-name-err"></span>
                </div>

                <div class="field-group">
                    <label class="field-label" for="signup-email">Email</label>
                    <div class="field-wrap">
                        <input type="email" id="signup-email" class="field-input" placeholder="you@example.com"
                            autocomplete="email" />
                    </div>
                    <span class="field-error" id="signup-email-err"></span>
                </div>

                <div class="field-group">
                    <label class="field-label" for="signup-password">Password</label>
                    <div class="field-wrap">
                        <input type="password" id="signup-password" class="field-input" placeholder="Min 6 characters"
                            autocomplete="new-password" />
                        <button class="eye-toggle" id="signup-eye" type="button"
                            aria-label="Toggle password visibility">
                            <svg id="signup-eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                    <span class="field-error" id="signup-pass-err"></span>
                </div>

                <div class="field-group">
                    <label class="field-label" for="signup-mobile">Mobile Number</label>
                    <div class="field-wrap">
                        <input type="tel" id="signup-mobile" class="field-input" placeholder="10-digit mobile number"
                            autocomplete="tel" inputmode="numeric" maxlength="10" />
                    </div>
                    <span class="field-error" id="signup-mobile-err"></span>
                </div>

                <button class="auth-btn" id="signup-btn">
                    Sign Up
                    
                </button>
                <div class="auth-switch">Already have an account? <a id="go-login">Sign in</a></div>
            </div>

        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const BASE_URL = 'http://localhost:3000';

        /* Redirect if already logged in */
        if (sessionStorage.getItem('quanment_user')) {
            window.location.href = 'index.html';
        }

        /* Tab switching */
        const tabLogin = document.getElementById('tab-login');
        const tabSignup = document.getElementById('tab-signup');
        const panelLogin = document.getElementById('panel-login');
        const panelSignup = document.getElementById('panel-signup');

        function showLogin() {
            tabLogin.classList.add('active'); tabSignup.classList.remove('active');
            panelLogin.classList.add('active'); panelSignup.classList.remove('active');
        }
        function showSignup() {
            tabSignup.classList.add('active'); tabLogin.classList.remove('active');
            panelSignup.classList.add('active'); panelLogin.classList.remove('active');
        }

        tabLogin.addEventListener('click', showLogin);
        tabSignup.addEventListener('click', showSignup);
        document.getElementById('go-signup').addEventListener('click', showSignup);
        document.getElementById('go-login').addEventListener('click', showLogin);

        /* Eye toggles */
        function makeEyeToggle(btnId, inputId, iconId) {
            document.getElementById(btnId).addEventListener('click', () => {
                const inp = document.getElementById(inputId);
                const icon = document.getElementById(iconId);
                const show = inp.type === 'password';
                inp.type = show ? 'text' : 'password';
                icon.innerHTML = show
                    ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
                    : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
            });
        }
        makeEyeToggle('login-eye', 'login-password', 'login-eye-icon');
        makeEyeToggle('signup-eye', 'signup-password', 'signup-eye-icon');

        /* Toast */
        let toastTimer;
        function showToast(msg, type = '') {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = `toast ${type} show`;
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
        }

        /* Field helpers */
        function setField(inputId, errId, valid, msg = '') {
            const inp = document.getElementById(inputId);
            const err = document.getElementById(errId);
            inp.classList.toggle('error', !valid);
            inp.classList.toggle('valid', valid);
            err.textContent = valid ? '' : msg;
            return valid;
        }

        function setLoading(btnId, loading) {
            const btn = document.getElementById(btnId);
            if (loading) {
                btn._html = btn.innerHTML;
                btn.innerHTML = '<span class="spinner"></span>';
                btn.disabled = true;
            } else {
                btn.innerHTML = btn._html || btn.innerHTML;
                btn.disabled = false;
            }
        }

        const isEmail = v => /^\S+@\S+\.\S+$/.test(v);
        const isMobile = v => /^\d{10}$/.test(v);

        /* LOGIN */
        document.getElementById('login-btn').addEventListener('click', async () => {
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-password').value;
            let ok = true;

            if (!email) ok = setField('login-email', 'login-email-err', false, 'Email is required') && false;
            else if (!isEmail(email)) ok = setField('login-email', 'login-email-err', false, 'Enter a valid email') && false;
            else setField('login-email', 'login-email-err', true);

            if (!pass) ok = setField('login-password', 'login-pass-err', false, 'Password is required') && false;
            else setField('login-password', 'login-pass-err', true);

            if (!ok) return;
            setLoading('login-btn', true);
            try {
                const res = await fetch(`${BASE_URL}/users?email=${encodeURIComponent(email)}`);
                const users = await res.json();
                const user = users.find(u => u.email === email && u.password === pass);
                if (!user) {
                    showToast('Invalid email or password', 'error');
                    setField('login-password', 'login-pass-err', false, 'Incorrect credentials');
                } else {
                    sessionStorage.setItem('quanment_user',
                        JSON.stringify({ id: user.id, name: user.name, email: user.email }));
                    showToast(`Welcome back, ${user.name}! 🎉`, 'success');
                    setTimeout(() => { window.location.href = 'index.html'; }, 1200);
                }
            } catch { showToast('Server unavailable. Is json-server running?', 'error'); }
            finally { setLoading('login-btn', false); }
        });

        /* SIGNUP */
        document.getElementById('signup-btn').addEventListener('click', async () => {
            const name = document.getElementById('signup-name').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const pass = document.getElementById('signup-password').value;
            const mobile = document.getElementById('signup-mobile').value.trim();
            let ok = true;

            if (!name) ok = setField('signup-name', 'signup-name-err', false, 'Full name is required') && false;
            else setField('signup-name', 'signup-name-err', true);
            if (!email) ok = setField('signup-email', 'signup-email-err', false, 'Email is required') && false;
            else if (!isEmail(email)) ok = setField('signup-email', 'signup-email-err', false, 'Enter a valid email') && false;
            else setField('signup-email', 'signup-email-err', true);
            if (!pass) ok = setField('signup-password', 'signup-pass-err', false, 'Password is required') && false;
            else if (pass.length < 6) ok = setField('signup-password', 'signup-pass-err', false, 'Minimum 6 characters') && false;
            else setField('signup-password', 'signup-pass-err', true);
            if (!mobile) ok = setField('signup-mobile', 'signup-mobile-err', false, 'Mobile number is required') && false;
            else if (!isMobile(mobile)) ok = setField('signup-mobile', 'signup-mobile-err', false, 'Enter a valid 10-digit number') && false;
            else setField('signup-mobile', 'signup-mobile-err', true);

            if (!ok) return;
            setLoading('signup-btn', true);
            try {
                const check = await fetch(`${BASE_URL}/users?email=${encodeURIComponent(email)}`);
                const existing = await check.json();
                if (existing.length > 0) {
                    setField('signup-email', 'signup-email-err', false, 'This email is already registered');
                    return;
                }
                const createRes = await fetch(`${BASE_URL}/users`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password: pass, mobile, createdAt: new Date().toISOString() }),
                });
                const newUser = await createRes.json();
                sessionStorage.setItem('quanment_user',
                    JSON.stringify({ id: newUser.id, name: newUser.name, email: newUser.email }));
                showToast(`Account created! Welcome, ${newUser.name} 🎉`, 'success');
                setTimeout(() => { window.location.href = 'index.html'; }, 1200);
            } catch { showToast('Server unavailable. Is json-server running?', 'error'); }
            finally { setLoading('signup-btn', false); }
        });

        /* Enter key shortcuts */
        document.getElementById('login-password').addEventListener('keydown',
            e => e.key === 'Enter' && document.getElementById('login-btn').click());
        document.getElementById('signup-mobile').addEventListener('keydown',
            e => e.key === 'Enter' && document.getElementById('signup-btn').click());

        /* Blur validation */
        const blurRules = [
            ['login-email', 'login-email-err', v => !v ? 'Email is required' : !isEmail(v) ? 'Enter a valid email' : ''],
            ['login-password', 'login-pass-err', v => !v ? 'Password is required' : ''],
            ['signup-name', 'signup-name-err', v => !v ? 'Full name is required' : ''],
            ['signup-email', 'signup-email-err', v => !v ? 'Email is required' : !isEmail(v) ? 'Enter a valid email' : ''],
            ['signup-password', 'signup-pass-err', v => !v ? 'Password is required' : v.length < 6 ? 'Minimum 6 characters' : ''],
            ['signup-mobile', 'signup-mobile-err', v => !v ? 'Mobile number is required' : !isMobile(v) ? 'Enter a valid 10-digit number' : ''],
        ];
        blurRules.forEach(([id, errId, check]) => {
            document.getElementById(id).addEventListener('blur', e => {
                const err = check(e.target.value.trim());
                setField(id, errId, !err, err);
            });
        });
    </script>
</body>

</html>
